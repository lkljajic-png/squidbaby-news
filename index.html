<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="description" content="Najnovije vijesti o Squid Game i BABYMONSTER">
  <title>SquidBaby News</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <img src="squidbabylogo.png" alt="SquidBaby News" class="login-logo">
      <h1 class="login-title">SquidBaby News</h1>
      <form id="loginForm" class="login-form" autocomplete="on" novalidate>
        <div class="input-wrap">
          <input type="text" id="loginUsername" placeholder="Korisničko ime"
                 autocomplete="username" spellcheck="false" required>
        </div>
        <div class="input-wrap">
          <input type="password" id="loginPassword" placeholder="Lozinka"
                 autocomplete="current-password" required>
        </div>
        <p id="loginError" class="login-error hidden"></p>
        <button type="submit" class="btn-login" id="loginBtn">Prijavi se</button>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" class="admin-panel hidden" aria-hidden="true">
    <div class="admin-card">
      <div class="admin-head">
        <h2>Korisnici</h2>
        <button id="closeAdmin" class="btn-icon" aria-label="Zatvori">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <ul id="userList" class="user-list"></ul>
      <form id="addUserForm" class="add-user-form">
        <h3>Dodaj korisnika</h3>
        <div class="input-wrap">
          <input type="text" id="newUsername" placeholder="Korisničko ime" spellcheck="false" required>
        </div>
        <div class="input-wrap">
          <input type="password" id="newPassword" placeholder="Lozinka" required>
        </div>
        <p id="addUserError" class="login-error hidden"></p>
        <button type="submit" class="btn-add">Dodaj</button>
      </form>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <!-- Red 1: logo + akcije -->
      <div class="header-row1">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 512 512" aria-hidden="true">
            <rect width="512" height="512" rx="72" fill="#0a0a0a"/>
            <circle cx="170" cy="256" r="95" fill="none" stroke="#c41e3a" stroke-width="28"/>
            <polygon points="342,161 452,351 232,351" fill="none" stroke="#d946ef" stroke-width="28" stroke-linejoin="round"/>
          </svg>
          <span>SquidBaby News</span>
        </div>
        <div class="header-actions">
          <button id="adminBtn" class="btn-admin hidden" aria-label="Dodaj korisnika">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/>
              <line x1="16" y1="11" x2="22" y2="11"/>
            </svg>
            <span>Korisnici</span>
          </button>
          <button id="refreshBtn" class="btn-icon-round" aria-label="Osvježi">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
              <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
          </button>
          <button id="logoutBtn" class="btn-icon-round" aria-label="Odjavi se">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      <!-- Red 2: ime + osvježeno -->
      <div class="header-row2">
        <span id="headerName" class="header-name hidden"></span>
        <span id="lastUpdated" class="status-text"></span>
      </div>
    </div>
  </header>

  <div id="offline-banner" class="offline-banner hidden">
    Nema internet veze — prikazani su keširani podaci
  </div>

  <main>
    <section id="squid" class="tab-content active">
      <div id="squidArticles" class="articles">
        <div class="skeleton-list">
          <div class="skeleton skeleton-hero"></div>
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
        </div>
      </div>
    </section>
    <section id="babymonster" class="tab-content">
      <div id="babymonsterArticles" class="articles">
        <div class="skeleton-list">
          <div class="skeleton skeleton-hero"></div>
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- DETALJ PRIKAZ -->
  <div id="detail-view" class="detail" aria-hidden="true">
    <header class="detail-header">
      <button id="detailBack" class="btn-back" aria-label="Nazad">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <span id="detailSourceHeader" class="detail-source-header"></span>
      <a id="detailExternal" href="#" target="_blank" rel="noopener" class="btn-external" aria-label="Otvori original">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </header>
    <div class="detail-body">
      <img id="detailImage" class="detail-img" alt="" loading="lazy">
      <div class="detail-content">
        <div class="detail-meta">
          <span id="detailSource" class="source"></span>
          <span class="dot">•</span>
          <span id="detailTime" class="time"></span>
        </div>
        <h1 id="detailTitle" class="detail-title"></h1>
        <p id="detailDesc" class="detail-desc"></p>
        <a id="detailReadBtn" href="#" target="_blank" rel="noopener" class="btn-read">
          Pročitaj cijeli članak
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="squid" role="tab" aria-selected="true">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 22 22">
          <circle cx="11" cy="11" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
      <span class="tab-label">Squid Game</span>
    </button>
    <button class="tab" data-tab="babymonster" role="tab" aria-selected="false">
      <span class="tab-icon">
        <svg width="22" height="22" viewBox="0 0 22 22">
          <polygon points="11,2 20,19 2,19" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="tab-label">BABYMONSTER</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
